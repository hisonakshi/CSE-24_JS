<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - College Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(120deg, #f093fb 0%, #f5576c 50%, #ff9a9e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #ff6b6b 0%, #ee5a24 50%, #f0932b 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .project-tag {
            background: rgba(255,255,255,0.25);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-section {
            padding: 40px;
            background: #fff5f7;
        }

        .form-title {
            font-size: 1.8em;
            color: #c44569;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e53e3e;
            font-size: 0.95em;
        }

        input, select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #fed7d7;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #fc8181;
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            margin-top:60px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
        }

        .add-btn:hover {
            background: #e85b5b;
        }

        .buttons-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            
        }

        .func-btn {
            padding: 14px 20px;
            border: 2px solid #fed7d7;
            border-radius: 10px;
            background: white;
            color: #c44569;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
        }

        .func-btn:hover {
            background: #ffe5e5;
        }

        .results-section {
            padding: 40px;
            background: #fef2f2;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .result-box {
            background: white;
            border-radius: 18px;
            padding: 35px;
            border-left: 6px solid #fc8181;
            min-height: 220px;
            box-shadow: 0 5px 20px rgba(252, 129, 129, 0.15);
        }

        .result-box h3 {
            color: #c44569;
            margin-bottom: 25px;
            font-size: 1.5em;
            font-weight: 700;
        }

        .result-box p {
            margin-bottom: 15px;
            line-height: 1.7;
            color: #666;
            font-size: 1.05em;
        }

        .total-box {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border-left-color: #fff;
        }

        .total-box h3 {
            color: white;
        }

        .total-box p {
            color: rgba(255,255,255,0.95);
            font-size: 1.1em;
        }

        @media (max-width: 900px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .input-row {
                grid-template-columns: 1fr;
            }
            .buttons-row {
                grid-template-columns: 1fr;
            }
            .form-section, .results-section {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1>Employee Management System</h1>
            <div class="project-tag">ABES Engineering College - CSE Project</div>
        </div>

        <!-- Input Form -->
        <div class="form-section">
            <h2 class="form-title">➕ Add New Employee</h2>
            <div class="input-row">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter employee name">
                </div>
                <div class="input-group">
                    <label for="empId">Employee ID</label>
                    <input type="text" id="empId" placeholder="EMP001">
                </div>
                <div class="input-group">
                    <label for="salary">Salary (₹)</label>
                    <input type="number" id="salary" placeholder="75000">
                </div>
                <div class="input-group">
                    <label for="dept">Department</label>
                    <select id="dept">
                        <option value="">Select Department</option>
                        <option value="IT">IT Department</option>
                        <option value="HR">CS department</option>
                        <option value="Finance">Finance & Accounts</option>
                        <option value="Marketing">Mechanical Engineering</option>
                        <option value="Operations">Sales & Marketing</option>
                    </select>
                </div>
            </div>
            <button class="add-btn" onclick="addEmployee()">Add Employee</button>
        </div>

        <!-- Function Buttons -->
        <div class="form-section">
            <div class="buttons-row">
                <button class="func-btn" onclick="displayEmployees()">👥 Display All Employees</button>
                <button class="func-btn" onclick="filterSalary()">⭐ High Salary Employees</button>
                <button class="func-btn" onclick="totalSalary()">💰 Total Salary</button>
                <button class="func-btn" onclick="averageSalary()">📈 Average Salary</button>
                <button class="func-btn" onclick="countDepartments()">📊 Department Count</button>
            </div>
        </div>

        <!-- Results -->
        <div class="results-section">
            <div class="results-grid">
                <div class="result-box" id="output">
                    <h3>📋 Results</h3>
                    <p>Add some employees first, then try the functions above!</p>
                </div>
                <div class="result-box total-box" id="total">
                    <h3>💼 Company Summary</h3>
                    <p>Total salary payout will appear here</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
