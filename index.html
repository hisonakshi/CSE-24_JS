<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Marks and Grade Calculator</title>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container{
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        width: 350px;
        text-align: center;
    }

    h2{
        color: #2c3e50;
        margin-bottom: 20px;
    }

    input{
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button{
        padding: 10px 20px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover{
        background-color: #2980b9;
    }

    #result{
        margin-top: 20px;
        text-align: left;
        font-size: 16px;
        line-height: 1.6;
    }
</style>

</head>
<body>

<div class="container">

    <h2>Student Marks Calculator</h2>

    <input type="number" id="subjects" placeholder="Enter Number of Subjects">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

</div>

<script>

function calculate(){

    let n = parseInt(document.getElementById("subjects").value);

    if(isNaN(n) || n <= 0){
        alert("Please enter a valid number of subjects");
        return;
    }

    let total = 0;
    let pass = true;

    for(let i = 1; i <= n; i++){

        let marks = parseFloat(prompt("Enter marks for Subject " + i));

        total += marks;

        if(marks < 40){
            pass = false;
        }
    }

    let average = total / n;
    let grade;

    if(average >= 90)
        grade = "A+";
    else if(average >= 80)
        grade = "A";
    else if(average >= 70)
        grade = "B";
    else if(average >= 60)
        grade = "C";
    else if(average >= 40)
        grade = "D";
    else
        grade = "F";

    let status = pass ? "Pass" : "Fail";

    document.getElementById("result").innerHTML = `
        <b>Total Marks:</b> ${total} <br>
        <b>Average:</b> ${average.toFixed(2)} <br>
        <b>Grade:</b> ${grade} <br>
        <b>Result:</b> ${status}
    `;
}

</script>

</body>
</html>
