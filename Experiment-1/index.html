<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment-1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(2em, 6vw, 3em);
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(45deg, #fff, rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h3 {
            font-size: clamp(1.1em, 4vw, 1.4em);
            margin-bottom: 30px;
            opacity: 0.95;
            line-height: 1.5;
        }

        form {
            margin-bottom: 30px;
        }

        input[type="number"] {
            width: 100%;
            max-width: 280px;
            padding: 20px 25px;
            border: none;
            border-radius: 50px;
            font-size: clamp(1.1em, 4vw, 1.3em);
            text-align: center;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            backdrop-filter: blur(15px);
            box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
        }

        input[type="number"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input[type="number"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            color: white;
            font-size: clamp(1.1em, 3.5vw, 1.3em);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(-2px);
        }

        #result {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: clamp(1.1em, 3vw, 1.3em);
            line-height: 1.6;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            .container {
                padding: 40px 30px;
                margin: 10px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 25px;
            }
            button {
                padding: 18px 40px;
                font-size: 1.1em;
            }
            input[type="number"] {
                padding: 18px 20px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Grade Calculator</h1>
        <h3>Enter the Number of Subjects</h3>
        <form action="#">
            <input type="number" id="subject" placeholder="Enter the No. of Subjects">
        </form>
        <button onclick="calculateResult()">Calculate result</button>
        <div id="result">Enter number of subjects and click <br> to see your results!</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
